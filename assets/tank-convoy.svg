<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 140" width="800" height="140" role="img" aria-label="Tank convoy rolling across">
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#140600"/>
      <stop offset="1" stop-color="#000000"/>
    </linearGradient>
    <linearGradient id="scanline" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#ff4d00" stop-opacity="0"/>
      <stop offset="0.5" stop-color="#ff4d00" stop-opacity="0.9"/>
      <stop offset="1" stop-color="#ffb300" stop-opacity="0"/>
    </linearGradient>
    <radialGradient id="flash" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#fff3c4"/>
      <stop offset="0.4" stop-color="#ffb300"/>
      <stop offset="1" stop-color="#ff4d00" stop-opacity="0"/>
    </radialGradient>

    <!-- ONE TANK -->
    <g id="tank">
      <rect x="0" y="70" width="96" height="20" rx="10" fill="#111"/>
      <g fill="#2b2b22" stroke="#000" stroke-width="1">
        <circle cx="14" cy="80" r="8"/>
        <circle cx="34" cy="80" r="8"/>
        <circle cx="54" cy="80" r="8"/>
        <circle cx="74" cy="80" r="8"/>
      </g>
      <path d="M2 70 L92 70 L82 50 L48 50 L40 40 L14 40 L6 50 Z" fill="#3d4030" stroke="#20221a" stroke-width="1.5"/>
      <rect x="30" y="34" width="34" height="18" rx="4" fill="#4a4d3a" stroke="#20221a" stroke-width="1.5"/>
      <rect x="60" y="40" width="48" height="6" rx="3" fill="#54574a"/>
      <rect x="104" y="39" width="6" height="8" rx="2" fill="#2b2b22"/>
      <circle cx="112" cy="43" r="10" fill="url(#flash)">
        <animate attributeName="r" values="0;12;0;0;0;0" dur="3.2s" repeatCount="indefinite"/>
        <animate attributeName="opacity" values="0;1;0;0;0;0" dur="3.2s" repeatCount="indefinite"/>
      </circle>
      <line x1="34" y1="34" x2="30" y2="16" stroke="#8a8a70" stroke-width="1.5"/>
      <circle cx="30" cy="16" r="2" fill="#ff4d00"/>
    </g>
  </defs>

  <rect width="800" height="140" fill="url(#sky)"/>
  <rect x="0" y="118" width="800" height="22" fill="#0a0a0a"/>
  <line x1="0" y1="118" x2="800" y2="118" stroke="#ff4d00" stroke-width="2" opacity="0.5"/>
  <line x1="0" y1="128" x2="800" y2="128" stroke="#3a2a10" stroke-width="2" stroke-dasharray="14 22"/>

  <g transform="translate(0,28)">
    <g>
      <animateTransform attributeName="transform" type="translate" from="0 0" to="180 0" dur="2.6s" repeatCount="indefinite"/>
      <use href="#tank" x="-180" y="0"/>
      <use href="#tank" x="0" y="0"/>
      <use href="#tank" x="180" y="0"/>
      <use href="#tank" x="360" y="0"/>
      <use href="#tank" x="540" y="0"/>
      <use href="#tank" x="720" y="0"/>
      <use href="#tank" x="900" y="0"/>
    </g>
  </g>

  <rect x="-200" y="0" width="200" height="140" fill="url(#scanline)" opacity="0.35">
    <animate attributeName="x" from="-200" to="800" dur="4s" repeatCount="indefinite"/>
  </rect>
</svg>
